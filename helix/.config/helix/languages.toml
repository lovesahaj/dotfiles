[[language]]
name = "python"
scope = "source.python"
injection-regex = "python"
file-types = ["py","pyi","py3","pyw",".pythonstartup",".pythonrc"]
shebangs = ["python"]
roots = ["pyproject.toml", "uv.lock", "pyrightconfig.json", ".git"]
comment-token = "#"
language-servers = [
    { name = "pyright", except-features = ["diagnostics", "format"] },
    { name = "ruff", only-features = ["diagnostics", "format"] },
]
indent = { tab-width = 4, unit = "    " }
auto-format = false

# Configure the pyright language server
[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]

[language-server.pyright.config]
reportMissingTypeStubs = false

[language-server.pyright.config.python]
# uv creates .venv in the project root by default
venvPath = "."
venv = ".venv"

[language-server.pyright.config.python.analysis]
typeCheckingMode = "strict"
autoImportCompletions = true

# Configure the ruff language server
[language-server.ruff]
command = "ruff"
args = ["server"]

[language-server.ruff.config.settings]
lineLength = 88
lint.select = ["E", "F", "I", "UP"]
lint.fixAll = true        # auto-fix on save, includes import sorting (I rules)
