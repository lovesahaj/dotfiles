##########################################################################

# themes
include theme.conf

# terminal opacity and blur
background_opacity 1.0
background_blur 1

# advance
term xterm-kitty

# clipboard: allow terminal apps (e.g. tmux) to read/write clipboard via OSC 52
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask no-append

# image protocol
allow_hyperlinks yes

# terminal bell
enable_audio_bell no

# os specific tweaks (Mac window decoration)
macos_hide_titlebar yes
hide_window_decorations titlebar-only

# font
font_family        Agave Nerd Font
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size 16.0

# font size management
map ctrl+shift+backspace change_font_size all 0

# cursor customization
# block / beam / underline
cursor_shape beam
cursor_blink_interval 0
cursor_stop_blinking_after 0
shell_integration no-cursor

# scrollback
scrollback_lines 10000
wheel_scroll_multiplier 3.0

# mouse
mouse_hide_wait -1

# window layout
remember_window_size  no
initial_window_width  1200
initial_window_height 750
window_border_width 1.5pt
enabled_layouts tall
window_padding_width 0
window_margin_width 2
hide_window_decorations no

##########################################################################
# window management
map ctrl+shift+enter new_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# layout management
map ctrl+shift+l next_layout
map ctrl+alt+r goto_layout tall
map ctrl+alt+s goto_layout stack

##########################################################################
# tab bar
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom
tab_bar_align left
active_tab_font_style   bold
inactive_tab_font_style normal

# tab management (unchanged)
map ctrl+shift+t new_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+q close_tab

##########################################################################
# leader key (backtick, 2s timeout)
# kitten_alias is not needed — use map with kitty_mod disabled
# Kitty does not have a native "leader" but we emulate it with ctrl+` sequences
# using a keymaps.conf approach via remote-control or just direct maps below

# non-prefix tab navigation (from wezterm ctrl+h/l)
map ctrl+h previous_tab
map ctrl+l next_tab
map ctrl+shift+h move_tab_backward
map ctrl+shift+l move_tab_forward

##########################################################################
# pane (window) splitting — leader emulated via ctrl+` prefix
# Kitty uses its own sequence: we map directly for simplicity

# split vertically (new window below)
map ctrl+shift+minus launch --location=hsplit

# split horizontally (new window to the right)
map ctrl+shift+backslash launch --location=vsplit

# pane navigation (vim-style, no leader needed in kitty)
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
# ctrl+shift+l is already move_tab_forward above; use alt for pane right
map alt+l neighboring_window right

# pane resizing
map alt+shift+h resize_window narrower 2
map alt+shift+j resize_window shorter 2
map alt+shift+k resize_window taller 2
map alt+shift+l resize_window wider 2

# pane zoom (toggle fullscreen for active window)
map ctrl+shift+z toggle_layout stack

# pane rotation
map ctrl+shift+. move_window_forward
map ctrl+shift+, move_window_backward

##########################################################################
# tab switching by number (like wezterm leader+1-9)
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

##########################################################################
# copy mode (vi-style, like wezterm copy_mode table)
map ctrl+shift+enter>v kitten hints --type word --program -
# enter kitty's built-in scrollback/copy mode
map ctrl+shift+y launch --type=overlay --stdin-source=@screen_scrollback less +G -R

# vi-style selection in kitty scrollback
# kitty uses its own scrollback pager; for full vi copy mode use scrollback_pager
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
